services:
  - type: web
    name: amc10practice
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    autoDeployTrigger: commit
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: AI_HINT_MODEL
        value: claude-opus-4-1-20250805
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: amc10practice-db
          property: connectionString

databases:
  - name: amc10practice-db
    plan: free
    databaseName: amc10practice
    user: amc10practice
